# Alembic configuration for SlideTap.
#
# The script_location points inside the package so migration scripts ship with
# the distribution and are reachable at runtime (DatabaseService runs
# `alembic upgrade head` on startup). For CLI use, run commands from this
# directory: `uv run alembic revision --autogenerate -m "..."`.
#
# sqlalchemy.url is intentionally blank — env.py reads SLIDETAP_DBURI from the
# environment so the CLI and the running app share one source of truth.

[alembic]
script_location = slidetap:migrations
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
# Optional: run black on generated migrations. Uncomment to enable.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
