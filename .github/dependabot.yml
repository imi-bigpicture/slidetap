version: 2
updates:
  # Documentation site (Jekyll / Ruby gems)
  - package-ecosystem: bundler
    directory: /docs
    schedule:
      interval: daily
    allow:
      - dependency-type: direct

  # Python backend (uv workspace; apps/example shares the root uv.lock)
  - package-ecosystem: pip
    directory: /slidetap-app
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]

  # Frontend (pnpm)
  - package-ecosystem: npm
    directory: /slidetap-client
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ["*"]

  # GitHub Actions used by workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
